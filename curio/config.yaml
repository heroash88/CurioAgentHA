name: "Curio Robot"
description: "Curio -- a voice-powered AI assistant with 30+ response cards, wake word detection, smart home control, and more."
version: "1.3.24"
slug: "curio_ha_addon"
url: "https://github.com/heroash88/CurioAgentHA"
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": "Curio web UI (direct access, needed for Google sign-in)"
homeassistant_api: true
auth_api: true
panel_icon: "mdi:robot-happy"
panel_title: "Curio Robot"
map:
  - config:rw
options:
  log_level: "info"
  port: 8099
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  port: port?
