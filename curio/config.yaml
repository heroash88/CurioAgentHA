name: "Curio Robot"
description: "Curio -- a voice-powered AI assistant with 30+ response cards, wake word detection, smart home control, and more."
version: "1.1.0"
slug: "curio_ha_addon"
url: "https://github.com/heroash88/CurioAgentHA"
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
homeassistant_api: true
auth_api: true
panel_icon: "mdi:robot-happy"
panel_title: "Curio Robot"
map:
  - config:rw
options:
  log_level: "info"
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
