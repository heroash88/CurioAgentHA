<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ea"/>
      <stop offset="0.42" stop-color="#e8f5f1"/>
      <stop offset="1" stop-color="#c4d7ee"/>
    </linearGradient>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="5" seed="31"/>
      <feDisplacementMap in="SourceGraphic" scale="8"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="33"/>
      <feColorMatrix type="saturate" values="0"/>
