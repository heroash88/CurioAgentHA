server {
    listen 8099;
    server_name _;

    root /var/www/html;
    index index.html;

    # Proxy HA Core API requests through the Supervisor internal network.
    # The browser can't reach http://supervisor directly, so nginx forwards
    # requests from /ha-proxy/* to http://supervisor/core/*.
    # __SUPERVISOR_TOKEN__ is replaced at runtime by run.sh.
    #
    # The haMcpService calls ${baseUrl}/api/services, ${baseUrl}/api/states, etc.
    # With baseUrl set to "<origin>/ha-proxy", the full path becomes
    # /ha-proxy/api/services which rewrites to /core/api/services on the
    # supervisor -- exactly what HA expects.
    location /ha-proxy/ {
        rewrite ^/ha-proxy/(.*)$ /core/$1 break;
        proxy_pass http://supervisor;
        proxy_set_header Authorization "Bearer __SUPERVISOR_TOKEN__";
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Accept $http_accept;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }

    # WebSocket proxy for HA (needed for MCP over WebSocket)
    location /ha-proxy-ws {
        rewrite ^/ha-proxy-ws$ /core/websocket break;
        proxy_pass http://supervisor;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # No-cache for the runtime config (token changes on restart)
    location = /ha-runtime-config.json {
        add_header Cache-Control "no-store, no-cache";
        try_files $uri =404;
    }

    # SPA fallback -- serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache models and WASM files
    location /models/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proper MIME types for WASM
    types {
        application/wasm wasm;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
